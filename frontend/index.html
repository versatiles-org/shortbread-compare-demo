<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Shortbread comparison — OSM vs. planetiler 1.1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <style>
    html, body { margin: 0; height: 100%; }
    #compare { position: absolute; inset: 0; overflow: hidden; }
    #before, #after { position: absolute; inset: 0; }
    /* the "after" (right) map is drawn on top and clipped to the right of the divider */
    #after { clip-path: inset(0 0 0 50%); }
    #slider {
      position: absolute; top: 0; bottom: 0; left: 50%; width: 4px; margin-left: -2px;
      background: #fff; box-shadow: 0 0 0 1px rgba(0,0,0,.35); cursor: ew-resize; z-index: 3;
    }
    #slider::after {
      content: '◀ ▶'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: #fff; border-radius: 999px; padding: 4px 8px; font: 12px/1 sans-serif;
      color: #333; box-shadow: 0 1px 4px rgba(0,0,0,.3); white-space: nowrap;
    }
    .badge {
      position: absolute; top: 10px; z-index: 4; padding: 4px 10px; border-radius: 6px;
      font: 13px/1.4 system-ui, sans-serif; color: #fff; background: rgba(0,0,0,.6); pointer-events: none;
    }
    #badge-left  { left: 10px; }
    #badge-right { right: 10px; }
  </style>
</head>

<body>
  <div id="compare">
    <div id="before"></div>
    <div id="after"></div>
    <div id="slider"></div>
    <div class="badge" id="badge-left">OSM &middot; tiles.versatiles.org</div>
    <div class="badge" id="badge-right">planetiler &middot; Shortbread 1.1 (local)</div>
  </div>

  <script>
    // ----- configuration -------------------------------------------------------------------
    // The "colorful" VersaTiles style (built for the Shortbread schema). The left map uses it
    // as-is (pointing at tiles.versatiles.org); the right map reuses it but with the source
    // rewritten to the locally served tiles.
    const STYLE_URL = 'https://tiles.versatiles.org/assets/styles/colorful.json';
    // Local tile URL — __SOURCE_ID__ is substituted by 03-serve.sh. Verify the path matches
    // your versatiles server (open /tiles/ to see the mounted sources).
    const LOCAL_TILES_URL = location.origin + '/tiles/__SOURCE_ID__/{z}/{x}/{y}';
    const START = { center: [9.0, 48.5], zoom: 4 };
    // ---------------------------------------------------------------------------------------

    async function buildLocalStyle() {
      const style = await (await fetch(STYLE_URL)).json();
      for (const key of Object.keys(style.sources || {})) {
        const src = style.sources[key];
        if (src.type === 'vector') {
          delete src.url;                 // drop the TileJSON reference to tiles.versatiles.org
          src.tiles = [LOCAL_TILES_URL];  // ...and point at the local source instead
          src.minzoom = src.minzoom ?? 0;
          src.maxzoom = 14;
        }
      }
      return style;
    }

    (async function () {
      const before = new maplibregl.Map({ container: 'before', style: STYLE_URL, ...START, attributionControl: false });
      const after  = new maplibregl.Map({ container: 'after',  style: await buildLocalStyle(), ...START, attributionControl: false });
      before.addControl(new maplibregl.AttributionControl({ compact: true }));

      // keep the two maps in sync (guard against the feedback loop)
      let syncing = false;
      const sync = (from, to) => from.on('move', () => {
        if (syncing) return;
        syncing = true;
        to.jumpTo({ center: from.getCenter(), zoom: from.getZoom(), bearing: from.getBearing(), pitch: from.getPitch() });
        syncing = false;
      });
      sync(before, after);
      sync(after, before);

      // draggable divider that clips the right map
      const slider = document.getElementById('slider');
      const afterEl = document.getElementById('after');
      const setSplit = (x) => {
        const pct = Math.max(0, Math.min(100, (x / window.innerWidth) * 100));
        slider.style.left = pct + '%';
        afterEl.style.clipPath = `inset(0 0 0 ${pct}%)`;
      };
      let dragging = false;
      const onDown = () => { dragging = true; document.body.style.userSelect = 'none'; };
      const onUp   = () => { dragging = false; document.body.style.userSelect = ''; };
      const onMove = (e) => { if (dragging) setSplit((e.touches ? e.touches[0] : e).clientX); };
      slider.addEventListener('mousedown', onDown);
      slider.addEventListener('touchstart', onDown, { passive: true });
      window.addEventListener('mouseup', onUp);
      window.addEventListener('touchend', onUp);
      window.addEventListener('mousemove', onMove);
      window.addEventListener('touchmove', onMove, { passive: true });
      window.addEventListener('resize', () => setSplit(window.innerWidth * (parseFloat(slider.style.left) || 50) / 100));
    })();
  </script>
</body>

</html>
